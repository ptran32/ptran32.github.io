# Patrice Tran — Chirpy theme (https://github.com/cotes2020/jekyll-theme-chirpy)

theme: jekyll-theme-chirpy

lang: en
timezone: America/Vancouver

title: Patrice Tran
tagline: Cloud, DevOps, and engineering notes
description: >-
  Technical writing on Kubernetes, cloud platforms, automation, and developer productivity.

url: "https://ptran32.github.io"

github:
  username: ptran32

twitter:
  username: patrice_tran

social:
  name: Patrice Tran
  links:
    - https://twitter.com/patrice_tran
    - https://github.com/ptran32
    - https://www.linkedin.com/in/patrice-tran/

avatar: https://github.com/ptran32.png

toc: true

paginate: 10
baseurl: ""

kramdown:
  footnote_backlink: "&#8617;︎"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
  span:
    line_numbers: false
  block:
    line_numbers: true
    start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: false
      toc: true
      permalink: /:year-:month-:day-:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - purgecss.js
  - "*.config.js"
  - "package*.json"
  - CHANGELOG.md
  - beautiful-jekyll-theme.gemspec
  - staticman.yml

jekyll-archives:
  enabled: [categories]
  layouts:
    category: category
  permalinks:
    category: /categories/:name/
